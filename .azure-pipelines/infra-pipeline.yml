trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  AWS_DEFAULT_REGION: 'eu-west-2'

stages:
- stage: Terraform
  displayName: 'Terraform Apply'
  jobs:
  - job: TerraformJob
    displayName: 'Provision AWS Infrastructure'
    steps:
    - script: |
        wget -q https://releases.hashicorp.com/terraform/1.7.0/terraform_1.7.0_linux_amd64.zip
        unzip terraform_1.7.0_linux_amd64.zip
        sudo mv terraform /usr/local/bin/
        terraform version
      displayName: 'Install Terraform'

    - script: |
        terraform init
      displayName: 'Terraform Init'
      workingDirectory: '$(System.DefaultWorkingDirectory)'
      env:
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_DEFAULT_REGION: $(AWS_DEFAULT_REGION)

    - script: |
        terraform plan
      displayName: 'Terraform Plan'
      workingDirectory: '$(System.DefaultWorkingDirectory)'
      env:
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_DEFAULT_REGION: $(AWS_DEFAULT_REGION)

    - script: |
        terraform apply -auto-approve
      displayName: 'Terraform Apply'
      workingDirectory: '$(System.DefaultWorkingDirectory)'
      env:
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_DEFAULT_REGION: $(AWS_DEFAULT_REGION)

    - script: |
        terraform output -json > tf-outputs.json
        cat tf-outputs.json
      displayName: 'Show Outputs'
      workingDirectory: '$(System.DefaultWorkingDirectory)'
      env:
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_DEFAULT_REGION: $(AWS_DEFAULT_REGION)

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Outputs'
      inputs:
        PathtoPublish: '$(System.DefaultWorkingDirectory)/tf-outputs.json'
        ArtifactName: 'terraform-outputs'
